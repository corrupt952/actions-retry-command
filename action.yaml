name: 'Retry Command'
description: 'Retries a shell command on failure with real-time output streaming'
author: 'corrupt952'

branding:
  icon: 'refresh-cw'
  color: 'blue'

inputs:
  command:
    description: 'The command to execute'
    required: true
  max_attempts:
    description: 'Maximum number of retry attempts'
    required: false
    default: '5'
  retry_interval:
    description: 'Seconds to wait between retries'
    required: false
    default: '5'
  timeout:
    description: 'Per-attempt timeout in seconds (empty = no timeout)'
    required: false
    default: ''
  shell:
    description: 'Shell to use for command execution (bash, sh)'
    required: false
    default: 'bash'
  retry_on_exit_code:
    description: 'Comma-separated exit codes that trigger retry (empty = any non-zero)'
    required: false
    default: ''

outputs:
  exit_code:
    description: 'Exit code of the last command execution'
  result:
    description: 'Combined stdout and stderr of the last command execution'

runs:
  using: node24
  main: dist/index.js
